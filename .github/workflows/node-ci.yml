name: Node CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Revisar estilo y errores basicos
        run: npm run lint

      - name: Revisar sintaxis JavaScript
        run: npm run check

      - name: Revisar vulnerabilidades altas
        run: npm audit --audit-level=high

      - name: Ejecutar smoke test con base de datos
        env:
          DB_HOST: ${{ secrets['DB_HOST'] }}
          DB_PORT: ${{ secrets['DB_PORT'] }}
          DB_NAME: ${{ secrets['DB_NAME'] }}
          DB_USER: ${{ secrets['DB_USER'] }}
          DB_PASSWORD: ${{ secrets['DB_PASSWORD'] }}
          DB_SSL: ${{ secrets['DB_SSL'] }}
          JWT_SECRET: ${{ secrets['JWT_SECRET'] }}
          JWT_EXPIRES_IN: ${{ secrets['JWT_EXPIRES_IN'] }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets['CLOUDINARY_CLOUD_NAME'] }}
          CLOUDINARY_API_KEY: ${{ secrets['CLOUDINARY_API_KEY'] }}
          CLOUDINARY_API_SECRET: ${{ secrets['CLOUDINARY_API_SECRET'] }}
          CORS_ORIGIN: "*"
        run: |
          if [ -z "$DB_HOST" ] || [ -z "$DB_NAME" ] || [ -z "$DB_USER" ] || [ -z "$DB_PASSWORD" ] || [ -z "$JWT_SECRET" ]; then
            echo "Smoke test omitido: configura DB_HOST, DB_NAME, DB_USER, DB_PASSWORD y JWT_SECRET para activarlo."
            exit 0
          fi

          npm run test:smoke
